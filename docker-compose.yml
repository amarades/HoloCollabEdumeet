version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=holo_user
      - POSTGRES_PASSWORD=change-me
      - POSTGRES_DB=holocollab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holo_user -d holocollab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./services/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://holo_user:change-me@db:5432/holocollab
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/backend/uploads:/app/uploads

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - BACKEND_BASE_URL=http://backend:8000
    depends_on:
      - backend

  cv-service:
    build:
      context: ./services/cv-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=development
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - realtime
      - cv-service
      - ai-service

volumes:
  postgres_data:
  ollama_data:
