version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: holocollab
      POSTGRES_USER: holo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holo_user -d holocollab"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiveKit SFU for WebRTC scaling
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"  # WebRTC connections
      - "7881:7881"  # HTTP API
      - "50000-60000:50000-60000/udp"  # WebRTC media ports
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-secret}"
      LIVEKIT_REDIS_ADDRESS: redis:6379
      LIVEKIT_RTC_TCP_PORT: 7880
      LIVEKIT_RTC_UDP_PORT: 50000
      LIVEKIT_RTC_ICE_SERVERS: '[{"urls":"stun:stun.l.google.com:19302"}]'
      LIVEKIT_RTC_FORCE_TCP: false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7881/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TURN server for NAT traversal
  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478"  # STUN/TURN
      - "3478:3478/udp"
      - "5349:5349"  # TURN over TLS
      - "5349:5349/udp"
    environment:
      TURNSERVER_NAME: coturn
      TURNSERVER_REALM: holocollab.local
      TURNSERVER_LISTEN_IP: 0.0.0.0
      TURNSERVER_EXTERNAL_IP: ${EXTERNAL_IP:-127.0.0.1}
      TURNSERVER_MIN_PORT: 49152
      TURNSERVER_MAX_PORT: 65535
      TURNSERVER_USERNAME: ${TURN_USERNAME:-turnuser}
      TURNSERVER_PASSWORD: ${TURN_PASSWORD:-turnpass}
      TURNSERVER_VERBOSE: 1
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf:ro

  # Load balancer (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - backend
      - realtime
      - livekit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend service
  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://holo_user:${POSTGRES_PASSWORD:-change-me-db-password}@postgres:5432/holocollab
      - REDIS_URL=redis://redis:6379/0
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - TURN_URL=turn:coturn:3478
      - TURN_USERNAME=${TURN_USERNAME:-turnuser}
      - TURN_PASSWORD=${TURN_PASSWORD:-turnpass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Realtime service
  realtime:
    build:
      context: ../services/realtime
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MAX_ROOM_SIZE=50
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI service
  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CV service
  cv-service:
    build:
      context: ../services/cv-service
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data: