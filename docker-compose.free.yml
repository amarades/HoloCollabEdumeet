version: '3.8'

# Simplified Docker Compose for Free Hosting
# Optimized for Railway, Render, and Fly.io free tiers

services:
  # Single combined service (free tier limitation)
  app:
    build:
      context: .
      dockerfile: Dockerfile.free
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Free tier environment
      - NODE_ENV=production
      - ENVIRONMENT=free

      # Database (Supabase/Upstash for free)
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_TOKEN=${REDIS_TOKEN}

      # Simplified WebRTC
      - VITE_ICE_SERVERS=[{"urls":"stun:stun.l.google.com:19302"}]

      # Disabled features
      - LIVEKIT_ENABLED=false
      - TURN_ENABLED=false
      - AI_SERVICE_ENABLED=false
      - CV_SERVICE_ENABLED=false
      - FILE_UPLOAD_ENABLED=false

      # Free tier limits
      - MAX_PARTICIPANTS=4
      - VIDEO_WIDTH=640
      - VIDEO_HEIGHT=480
      - VIDEO_FRAME_RATE=15

    # Health check for free tiers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits for free tier
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Optional: Use Railway/Render managed databases
  # Comment out if using external (Supabase/Upstash)
